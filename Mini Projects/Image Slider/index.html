<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="container" onmouseover="playPause('pause')" onmouseleave="playPause('play')">
            <div id="slider" class="slider">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1448375240586-882707db888b" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1426604966848-d7adac402bff" alt="Random Nature Image" />
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d" alt="Random Nature Image" />
            </div>
            <div class="buttons">
                <button id="btn-left" class="btn btn-left" onclick="prev()">
                    <span class="icon material-symbols-outlined">arrow_back_ios</span>
                </button>
                <button id="btn-right" class="btn btn-right" onclick="next()">
                    <span class="icon material-symbols-outlined">arrow_forward_ios</span>
                </button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
