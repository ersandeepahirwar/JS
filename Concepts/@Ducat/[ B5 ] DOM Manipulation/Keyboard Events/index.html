<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Events</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="container">
            <div class="form-group">
                <input type="text" name="name" id="name" placeholder="What is your name?" onkeydown="first(event)"
                    onkeypress="second(event)" onkeyup="third(event)">
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
